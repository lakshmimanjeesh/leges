<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leges</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar">
        <h1 class="logo">Leges</h1>
        <div class="profile-icon">👤</div>
    </nav>

    <main class="container">
        <section class="hero-section">
            <h2>What happened?</h2>
            <p>Explain your situation and understand your legal rights instantly.</p>
        </section>

        <div class="card">
            <label for="scenario">Your Case Scenario</label>
            <textarea id="scenario" class="text-area" placeholder="Describe your legal issue in detail..."></textarea>
            <div class="meta-info">
                <span>Press Ctrl + Enter to analyze</span>
                <span id="char-count">0 characters</span>
            </div>

            <div class="chip-container">
                <button class="chip" onclick="fill('Online fraud')">Online fraud</button>
                <button class="chip" onclick="fill('Landlord dispute')">Landlord dispute</button>
                <button class="chip" onclick="fill('Salary not paid')">Salary not paid</button>
            </div>

            <div class="actions">
                <button class="btn-primary" onclick="startAnalysis()">Analyze Situation</button>
                <button class="btn-secondary" onclick="clearText()">Clear</button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
