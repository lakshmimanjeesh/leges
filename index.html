<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Leges</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-[#f8fafc] min-h-screen">



    <nav class="flex justify-between items-center px-10 py-4 bg-white border-b border-slate-100 shadow-sm sticky top-0 z-50">

        <h1 class="text-2xl font-bold text-blue-700">Leges</h1>

        <div class="flex items-center gap-8">

            <div class="w-8 h-8 rounded-full border border-slate-300 flex items-center justify-center bg-slate-50">👤</div>

        </div>

    </nav>



    <main class="w-full px-12 py-16">

        <div class="text-center mb-12">

            <h2 class="text-5xl font-extrabold text-[#0f172a] mb-4">What happened?</h2>

            <p class="text-slate-600 text-lg">Explain your situation and understand your legal rights instantly.</p>

        </div>



        <div class="max-w-[1400px] mx-auto bg-white rounded-3xl shadow-sm border border-slate-100 p-10">

            <div class="mb-6 text-left">

                <label class="block text-sm font-medium text-slate-700 mb-2">Your Case Scenario</label>

                <textarea id="scenario" rows="8"

                    class="w-full p-6 text-slate-800 bg-white border border-slate-200 rounded-2xl focus:ring-1 focus:ring-blue-500 outline-none transition-all resize-none"

                    placeholder="Describe your legal issue in detail..."></textarea>

               

                <div class="mt-4 text-sm text-slate-500 flex gap-2">

                    <span>Press Ctrl + Enter to analyze</span>

                    <span id="char-count">0 characters</span>

                </div>

            </div>



            <div class="flex flex-wrap gap-3 mb-8">

                <button onclick="fill('Online fraud')" class="px-5 py-2.5 bg-[#eff6ff] hover:bg-blue-100 rounded-full text-sm font-medium text-blue-800 transition">Online fraud</button>

                <button onclick="fill('Landlord dispute')" class="px-5 py-2.5 bg-[#eff6ff] hover:bg-blue-100 rounded-full text-sm font-medium text-blue-800 transition">Landlord dispute</button>

                <button onclick="fill('Salary not paid')" class="px-5 py-2.5 bg-[#eff6ff] hover:bg-blue-100 rounded-full text-sm font-medium text-blue-800 transition">Salary not paid</button>

            </div>



            <div class="flex flex-col items-start gap-4">

                <button id="analyze-btn" onclick="startAnalysis()"

                    class="px-10 py-4 bg-[#2563eb] hover:bg-blue-700 text-white rounded-xl font-bold transition flex items-center gap-3">

                    <span id="btn-text">Analyze Situation</span>

                    <div id="spinner" class="hidden w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>

                </button>

                <button onclick="clearText()" class="text-sm font-medium text-slate-500 hover:text-red-500 transition">Clear</button>

            </div>

        </div>

    </main>



    <script src="script.js"></script>

</body>

</html>
